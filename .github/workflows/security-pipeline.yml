name: Security Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security_scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install wget -y
          wget https://github.com/aquasecurity/trivy/releases/download/v0.50.0/trivy_0.50.0_Linux-64bit.deb
          sudo dpkg -i trivy_0.50.0_Linux-64bit.deb

      - name: Install OPA
        run: |
          wget https://openpolicyagent.org/downloads/latest/opa_linux_amd64
          chmod +x opa_linux_amd64
          sudo mv opa_linux_amd64 /usr/local/bin/opa

      - name: Run Trivy scan and export results
        run: |
          trivy fs . --severity HIGH,CRITICAL --format json -o scan-results.json

      - name: Evaluate policy with OPA
        run: |
          opa eval --data policy.rego --input scan-results.json "data.security.deny"

      # C'EST CETTE ÉTAPE QU'ON AJOUTE TOUT À LA FIN :
      - name: Send Slack alert
        if: failure()  # S'exécute SEULEMENT si Trivy ou OPA détectent une anomalie et bloquent
        uses: slackapi/slack-github-action@v1.23.0
        with:
          payload: |
            {
              "text": "🚨 *Alerte DevOpsSec* : Une vulnérabilité critique ou une non-conformité a été détectée dans le microservice ! Le déploiement est bloqué."
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
