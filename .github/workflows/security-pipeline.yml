name: Security Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  trivy-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t microservice-security:latest .

      - name: Install and Run Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
          trivy image --exit-code 1 --severity CRITICAL,HIGH microservice-security:latest

      # --- NOUVELLE ÉTAPE OPA ---
      - name: Run OPA Policy Scan
        run: |
          # Installation d'OPA
          curl -L -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64
          chmod 755 opa
          sudo mv opa /usr/local/bin/
          
          # Exécution de l'évaluation
          # On vérifie si la règle "deny" retourne des résultats
          result=$(opa eval --data policy.rego --input deployment.json "data.security.deny")
          
          # Si le résultat contient autre chose qu'une liste vide, on bloque
          # On cherche dans le JSON si la clé "result" contient des expressions
          if [[ "$result" != *"\"expressions\":[]"* ]]; then
             echo "❌ Violation de politique de sécurité détectée par OPA !"
             echo $result
             exit 1
          fi
